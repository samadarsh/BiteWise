services:
  - type: web
    name: bitewise-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: development
      - key: USE_MOCK_MCP
        value: "true"
      - key: SWIGGY_ENV
        value: mock
      - key: DATABASE_URL
        value: sqlite:///./nutriorder.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ALLOW_PLACE_ORDER
        value: "false"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
